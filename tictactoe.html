<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #reset {
      margin-top: 2rem;
      padding: 0.7rem 2.2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    #reset:hover {
      background: #c73652;
      transform: scale(1.04);
    }

    #score {
      display: flex;
      gap: 2.5rem;
      margin-top: 1.8rem;
      font-size: 1rem;
      color: #aaa;
    }

    #score span { font-size: 1.4rem; font-weight: bold; }
    .sx { color: #e94560; }
    .so { color: #a8dadc; }
    .sd { color: #888; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">X's turn</div>
  <div id="board"></div>
  <button id="reset">New Game</button>
  <div id="score">
    <div>X wins: <span class="sx" id="sx">0</span></div>
    <div>Draws: <span class="sd" id="sd">0</span></div>
    <div>O wins: <span class="so" id="so">0</span></div>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over, scores = {x:0, o:0, d:0};

    const boardEl  = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const cells    = [];

    // Build cells once
    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.addEventListener('click', () => play(i));
      boardEl.appendChild(cell);
      cells.push(cell);
    }

    function newGame() {
      board   = Array(9).fill(null);
      current = 'X';
      over    = false;
      cells.forEach(c => { c.className = 'cell'; c.textContent = ''; });
      statusEl.textContent = "X's turn";
    }

    function play(i) {
      if (over || board[i]) return;
      board[i] = current;
      const cell = cells[i];
      cell.textContent = current;
      cell.classList.add(current.toLowerCase(), 'taken');

      const win = checkWin();
      if (win) {
        win.forEach(idx => cells[idx].classList.add('win'));
        statusEl.textContent = `${current} wins!`;
        scores[current.toLowerCase()]++;
        updateScore();
        over = true;
      } else if (board.every(Boolean)) {
        statusEl.textContent = "It's a draw!";
        scores.d++;
        updateScore();
        over = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        statusEl.textContent = `${current}'s turn`;
      }
    }

    function checkWin() {
      for (const [a,b,c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c])
          return [a,b,c];
      }
      return null;
    }

    function updateScore() {
      document.getElementById('sx').textContent = scores.x;
      document.getElementById('so').textContent = scores.o;
      document.getElementById('sd').textContent = scores.d;
    }

    document.getElementById('reset').addEventListener('click', newGame);
    newGame();
  </script>
</body>
</html>
